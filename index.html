<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Relay Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;600&display=swap');
  :root {
    --bg: #0a0a0f; --panel: #12121a; --border: #1e1e2e;
    --accent: #00ff88; --accent2: #ff3366; --text: #c8c8d8; --dim: #44445a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,255,136,0.015) 40px, rgba(0,255,136,0.015) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,255,136,0.015) 40px, rgba(0,255,136,0.015) 41px);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
  .header { text-align: center; padding: 6px 0 14px; }
  .header h1 { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--dim); margin-bottom: 5px; }
  .header .device-name { font-size: 22px; font-weight: 600; letter-spacing: 2px; }
  .status-bar {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 14px; display: flex; align-items: center; gap: 10px;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); flex-shrink: 0; transition: all 0.3s; }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  .status-dot.connecting { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; animation: blink 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #status-text { flex: 1; }
  .connect-btn {
    background: transparent; border: 1px solid var(--border); color: var(--accent);
    padding: 6px 12px; border-radius: 4px; font-family: 'Share Tech Mono', monospace;
    font-size: 11px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  }
  .connect-btn:active { transform: scale(0.97); }
  .impulse-btn {
    width: 100%; padding: 30px 20px; border-radius: 14px;
    border: 2px solid rgba(0,255,136,0.35); background: rgba(0,255,136,0.07);
    color: var(--accent); font-family: 'Rajdhani', sans-serif; font-size: 28px;
    font-weight: 600; letter-spacing: 3px; cursor: pointer; transition: all 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .impulse-btn .sub { font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--dim); letter-spacing: 2px; }
  .impulse-btn:not(.btn-disabled):active { transform: scale(0.98); }
  .impulse-btn.btn-disabled { opacity: 0.3; cursor: not-allowed; }
  .impulse-btn.running { border-color: #ffaa00; background: rgba(255,170,0,0.07); color: #ffaa00; animation: rpulse 0.8s infinite; }
  @keyframes rpulse { 0%,100%{box-shadow:0 0 10px rgba(255,170,0,0.15)} 50%{box-shadow:0 0 28px rgba(255,170,0,0.35)} }
  .progress-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #ffaa00; border-radius: 2px; transition: width linear; }
  .relay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .relay-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px; display: flex; flex-direction: column; gap: 9px; }
  .relay-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--dim); }
  .relay-btn { border: none; border-radius: 7px; padding: 12px 8px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; }
  .relay-btn:active { transform: scale(0.96); }
  .btn-on { background: rgba(0,255,136,0.15); color: var(--accent); border: 1px solid rgba(0,255,136,0.3); }
  .btn-off { background: rgba(255,51,102,0.12); color: var(--accent2); border: 1px solid rgba(255,51,102,0.25); }
  .btn-disabled { opacity: 0.3; cursor: not-allowed; }
  .log-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px; font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--dim); height: 70px; overflow-y: auto; line-height: 1.6;
  }
  .log-entry.ok { color: var(--accent); }
  .log-entry.err { color: var(--accent2); }
  .log-entry.info { color: #88aaff; }
  .log-entry.warn { color: #ffaa00; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>BLE CONTROLLER</h1>
    <div class="device-name">ZL_RELAY02</div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="dot"></div>
    <span id="status-text">Nicht verbunden</span>
    <button class="connect-btn" id="connect-btn" onclick="toggleConnect()">VERBINDEN</button>
  </div>

  <button class="impulse-btn btn-disabled" id="impulse-btn" onclick="sendImpulse()">
    <span id="impulse-label">⚡ ÖFFNEN</span>
    <span class="sub" id="impulse-sub">0.5s Impuls · Kanal 2</span>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </button>

  <div class="relay-grid">
    <div class="relay-card">
      <div class="relay-label">KANAL 1</div>
      <button class="relay-btn btn-on btn-disabled" id="r1on"  onclick="send('c5043838383838383838aa')">▲ EIN</button>
      <button class="relay-btn btn-off btn-disabled" id="r1off" onclick="send('c5063838383838383838aa')">▼ AUS</button>
    </div>
    <div class="relay-card">
      <div class="relay-label">KANAL 2</div>
      <button class="relay-btn btn-on btn-disabled" id="r2on"  onclick="send('c5053838383838383838aa')">▲ EIN</button>
      <button class="relay-btn btn-off btn-disabled" id="r2off" onclick="send('c5073838383838383838aa')">▼ AUS</button>
    </div>
  </div>

  <div class="log-panel" id="log">
    <div class="log-entry info">// Chrome erforderlich für Web Bluetooth</div>
  </div>
</div>

<script>
const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
const CHAR_UUID    = '0000ffe1-0000-1000-8000-00805f9b34fb';
const IMPULSE_MS   = 500;

let device = null, characteristic = null, connected = false, running = false;

function log(msg, type = '') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-entry ' + type;
  d.textContent = '> ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setConnected(state) {
  connected = state;
  document.getElementById('dot').className = 'status-dot' + (state ? ' connected' : '');
  document.getElementById('status-text').textContent = state ? 'Verbunden' : 'Nicht verbunden';
  document.getElementById('connect-btn').textContent = state ? 'TRENNEN' : 'VERBINDEN';
  ['r1on','r1off','r2on','r2off','impulse-btn'].forEach(id => {
    document.getElementById(id).classList.toggle('btn-disabled', !state);
  });
}

async function toggleConnect() {
  if (connected) {
    if (device && device.gatt.connected) device.gatt.disconnect();
    setConnected(false);
    log('Getrennt', 'err');
    return;
  }
  try {
    document.getElementById('dot').className = 'status-dot connecting';
    document.getElementById('status-text').textContent = 'Verbinde...';
    log('Suche ZL_RELAY02...', 'info');

    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'ZL_RELAY02' }],
      optionalServices: [SERVICE_UUID]
    });
    device.addEventListener('gattserverdisconnected', () => {
      setConnected(false);
      log('Verbindung verloren', 'err');
    });

    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);

    setConnected(true);
    log('Verbunden ✓', 'ok');
  } catch(e) {
    setConnected(false);
    log('Fehler: ' + e.message, 'err');
  }
}

async function send(hexStr) {
  if (!connected || !characteristic) return;
  const bytes = hexStr.match(/.{1,2}/g).map(b => parseInt(b, 16));
  await characteristic.writeValueWithoutResponse(new Uint8Array(bytes));
  log('TX: ' + hexStr, 'ok');
}

async function sendImpulse() {
  if (!connected || running) return;
  running = true;

  const btn = document.getElementById('impulse-btn');
  const lbl = document.getElementById('impulse-label');
  const sub = document.getElementById('impulse-sub');
  const bar = document.getElementById('progress');

  btn.classList.add('running');
  lbl.textContent = '⏳ OFFEN...';
  sub.textContent = 'Schließt in 0.5s';
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${IMPULSE_MS}ms linear`;
    bar.style.width = '100%';
  }));

  try {
    await send('c5053838383838383838aa');
    log('Impuls EIN – warte 0.5s', 'warn');
    await new Promise(r => setTimeout(r, IMPULSE_MS));
    await send('c5073838383838383838aa');
    log('Impuls fertig ✓', 'ok');
  } catch(e) {
    log('Fehler: ' + e.message, 'err');
  }

  btn.classList.remove('running');
  lbl.textContent = '⚡ ÖFFNEN';
  sub.textContent = '0.5s Impuls · Kanal 2';
  bar.style.transition = 'none';
  bar.style.width = '0%';
  running = false;
}
</script>
</body>
</html>
